name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode 26
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)/Contents/Developer"

      - name: Build
        run: |
          xcodebuild -project swiss_bar.xcodeproj -scheme swiss_bar -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run unit tests
        run: |
          # xcodebuild test runs on the actual host OS, which can trail the project's
          # MACOSX_DEPLOYMENT_TARGET by a runner point-release; relax the target for this
          # test invocation only so it can launch - the real build/release target is untouched.
          RUNNER_OS_VERSION="$(sw_vers -productVersion | cut -d. -f1,2)"
          xcodebuild test -project swiss_bar.xcodeproj -scheme swiss_bar \
            -destination 'platform=macOS' \
            -only-testing:swiss_barTests \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET="$RUNNER_OS_VERSION"
